apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head>
        <title>NGINX Dev UI</title>
        <style>
          body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            padding-top: 60px;
          }
          h1 {
            color: #2c3e50;
          }
          p {
            font-size: 16px;
            color: #555;
          }
        </style>
      </head>
      <body>
        <h1>Hello from NGINX</h1>
        <p>This UI is served using a Kubernetes ConfigMap.</p>
        <p><b>Environment:</b> DEV and test</p>
      </body>
    </html>
